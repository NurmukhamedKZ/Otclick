# Production compose for AIautoclicker backend + worker.
# Run from repo root:  docker compose -f infra/docker-compose.yml up -d --build
#
# Frontend → Vercel. Database → Supabase. This file = API + worker only.
# nginx + TLS live on the host, not in a container (simpler certbot renewal).

services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: aiautoclicker-backend:latest
    container_name: aiautoclicker-api
    restart: unless-stopped
    env_file:
      - ../backend/.env
    ports:
      # Bind to localhost only — host nginx proxies to it.
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    # Reuse the API image — same code, different entrypoint.
    image: aiautoclicker-backend:latest
    container_name: aiautoclicker-worker
    restart: unless-stopped
    env_file:
      - ../backend/.env
    command: ["python", "worker_main.py"]
    depends_on:
      api:
        condition: service_healthy
    # Playwright Chromium needs more shared memory than the 64 MB default.
    shm_size: "1gb"
