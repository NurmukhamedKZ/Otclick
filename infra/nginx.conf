# Host-level nginx config for api.yourdomain.com
# Install: copy to /etc/nginx/sites-available/api, then:
#   sudo ln -s /etc/nginx/sites-available/api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.yourdomain.com   # adds TLS server block

server {
    listen 80;
    server_name api.yourdomain.com;

    # CloudPayments webhook posts up to ~10 KB; bump for safety.
    client_max_body_size 1m;

    # Proxy timeouts — Playwright onboarding can take ~30 s.
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
