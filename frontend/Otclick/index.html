<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Otclick — автооткликалка для hh</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #EFEAE0;
    --bg-deep: #E6E0D2;
    --surface: #FFFFFF;
    --ink: #1A1B1F;
    --ink-soft: #2A2B30;
    --muted: #8B867D;
    --muted-2: #B5AFA2;
    --line: #E4DFD2;
    --line-2: #ECE7DA;
    --yellow: #F5CB3D;
    --yellow-soft: #FCE89B;
    --coral: #E96B58;
    --coral-soft: #F5B7AD;
    --sage: #C7D4B6;
    --sage-soft: #E3EAD7;
    --ok: #4B8A5B;
    --warn: #D08B2A;
    --err: #C04A38;
  }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    font-family: 'Manrope', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "ss02", "cv11";
  }
  .mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: "tnum", "zero"; }
  .serif { font-family: 'Instrument Serif', serif; font-style: italic; }
  button { font: inherit; cursor: pointer; }
  ::selection { background: var(--yellow); color: var(--ink); }
  /* Subtle paper noise on bg */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(rgba(0,0,0,0.025) 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode: multiply;
    opacity: 0.5;
  }
  #root { position: relative; z-index: 1; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 999px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="overlays.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
